<div style="padding:1rem 0;display:flex;flex-direction:column;align-items:center;gap:14px">
<h2 class="sr-only">Echo: watch the pads light up in sequence, then repeat it by clicking them in the same order. Each round adds one more step.</h2>
<div style="display:flex;justify-content:space-between;width:320px;font-size:14px">
<span>Level: <b id="level">0</b></span>
<span id="status" style="color:var(--text-secondary)">Press start</span>
</div>
<div id="grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;width:320px;height:320px">
<div class="pad" data-i="0" style="background:#e24b4a;border-radius:12px;cursor:pointer;transition:filter 120ms,transform 120ms"></div>
<div class="pad" data-i="1" style="background:#378add;border-radius:12px;cursor:pointer;transition:filter 120ms,transform 120ms"></div>
<div class="pad" data-i="2" style="background:#639922;border-radius:12px;cursor:pointer;transition:filter 120ms,transform 120ms"></div>
<div class="pad" data-i="3" style="background:#ba7517;border-radius:12px;cursor:pointer;transition:filter 120ms,transform 120ms"></div>
</div>
<button id="start" style="font-size:13px;padding:6px 16px">Start</button>
<p style="font-size:12px;color:var(--text-muted);margin:0">Tip: keys 1 2 3 4 also work</p>
</div>
<script>
const pads = document.querySelectorAll('.pad');
const levelEl = document.getElementById('level');
const status = document.getElementById('status');
const startBtn = document.getElementById('start');
let sequence = [], userStep = 0, level = 0, accepting = false, playing = false;

function flash(i, dur) {
  return new Promise(resolve => {
    const pad = pads[i];
    pad.style.filter = 'brightness(1.7)';
    pad.style.transform = 'scale(0.96)';
    setTimeout(() => {
      pad.style.filter = 'none';
      pad.style.transform = 'scale(1)';
      setTimeout(resolve, dur * 0.25);
    }, dur * 0.75);
  });
}

async function playSequence() {
  accepting = false;
  status.textContent = 'Watch';
  const dur = Math.max(320, 620 - level * 20);
  await new Promise(r => setTimeout(r, 400));
  for (const i of sequence) {
    await flash(i, dur);
  }
  userStep = 0;
  accepting = true;
  status.textContent = 'Your turn';
}

function nextRound() {
  level++;
  levelEl.textContent = level;
  sequence.push(Math.floor(Math.random() * 4));
  playSequence();
}

function handleInput(i) {
  if (!accepting || !playing) return;
  const pad = pads[i];
  pad.style.filter = 'brightness(1.7)';
  setTimeout(() => pad.style.filter = 'none', 150);
  if (i === sequence[userStep]) {
    userStep++;
    if (userStep === sequence.length) {
      status.textContent = 'Correct — next round';
      setTimeout(nextRound, 700);
    }
  } else {
    accepting = false;
    playing = false;
    status.textContent = 'Missed it — final level ' + level;
    startBtn.textContent = 'Play again';
  }
}

pads.forEach(p => p.addEventListener('click', () => handleInput(Number(p.dataset.i))));
document.addEventListener('keydown', e => {
  const map = {'1':0,'2':1,'3':2,'4':3};
  if (map[e.key] !== undefined) handleInput(map[e.key]);
});

startBtn.addEventListener('click', () => {
  sequence = []; level = 0; playing = true;
  levelEl.textContent = 0;
  startBtn.textContent = 'Restart';
  nextRound();
});
</script>
