<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Living City</title>
<style>
  :root{
    --sky-top:#8fd3f4;
    --sky-bot:#e8f9fd;
    --sun:#ffe17a;
    --far:#b7c9e0;
    --mid:#93a9cc;
    --near:#6f88b3;
    --road:#3c3c46;
    --line:#f4e57a;
    --grass:#7bc46b;
    --grass2:#69ab5b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--sky-bot);overflow:hidden;}
  .scene{
    position:relative;width:100vw;height:100vh;
    background:linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bot) 65%);
    font-family:'Segoe UI',Tahoma,sans-serif;
  }
  .title{
    position:absolute;top:14px;left:20px;color:#2b3a55;
    font-size:13px;letter-spacing:4px;text-transform:uppercase;opacity:.6;z-index:20;
  }
  .hint{
    position:absolute;top:14px;right:20px;color:#2b3a55;
    font-size:11px;opacity:.55;z-index:20;
  }

  /* Sun & clouds */
  .sun{
    position:absolute;top:6%;right:10%;width:80px;height:80px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fffbe0, var(--sun) 60%, #ffce54 100%);
    box-shadow:0 0 50px 14px rgba(255,225,122,.55);
  }
  .cloud{
    position:absolute;background:#fff;border-radius:50px;opacity:.9;
    animation:driftCloud linear infinite;
  }
  @keyframes driftCloud{
    from{transform:translateX(-140px);}
    to{transform:translateX(110vw);}
  }

  /* Birds (decorative, not clickable) */
  .bird{position:absolute;width:26px;height:14px;animation:flyPath linear infinite;}
  .bird svg{width:100%;height:100%;display:block;}
  .wing{transform-origin:13px 7px;animation:flap .5s ease-in-out infinite;}
  @keyframes flap{
    0%,100%{transform:scaleY(1) rotate(0deg);}
    50%{transform:scaleY(0.35) rotate(-8deg);}
  }
  @keyframes flyPath{
    from{transform:translate(-60px,0);}
    to{transform:translate(calc(100vw + 60px), -30px);}
  }

  /* Building layers (decorative) */
  .layer{position:absolute;bottom:170px;left:0;width:200%;display:flex;align-items:flex-end;}
  .far{animation:scroll 70s linear infinite;opacity:.65;}
  .mid{animation:scroll 40s linear infinite;opacity:.85;}
  .near{animation:scroll 22s linear infinite;}
  @keyframes scroll{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
  .bld{position:relative;flex-shrink:0;margin-right:14px;}
  .far .bld{background:var(--far);}
  .mid .bld{background:var(--mid);}
  .near .bld{background:var(--near);}
  .win{position:absolute;width:6px;height:9px;background:rgba(255,255,255,.55);}
  .win.dim{background:rgba(255,255,255,.22);}

  /* Park strip (decorative) */
  .park{
    position:absolute;bottom:150px;left:0;width:100%;height:64px;
    background:linear-gradient(to bottom, var(--grass), var(--grass2));
  }
  .tree{position:absolute;bottom:6px;width:10px;height:34px;}
  .tree .trunk{position:absolute;bottom:0;left:3px;width:4px;height:16px;background:#7a5230;}
  .tree .leaves{position:absolute;bottom:12px;left:-8px;width:26px;height:26px;border-radius:50%;background:#4c9a45;}
  .tree .leaves::before,.tree .leaves::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#57a94f;}
  .tree .leaves::before{left:-8px;top:4px;}
  .tree .leaves::after{left:12px;top:2px;}

  .swingset{position:absolute;bottom:6px;width:70px;height:56px;}
  .swingset .pole{position:absolute;width:3px;height:56px;background:#8a5a3b;}
  .swingset .pole.l{left:4px;}
  .swingset .pole.r{right:4px;}
  .swingset .bar{position:absolute;top:0;left:0;width:100%;height:3px;background:#8a5a3b;}
  .swing{position:absolute;top:3px;left:50%;width:2px;height:0;transform-origin:top center;animation:swingMove 2.2s ease-in-out infinite;}
  .swing .rope{position:absolute;top:0;left:-8px;width:2px;height:32px;background:#5a4a3a;}
  .swing .rope.r{left:8px;}
  .swing .seat{position:absolute;top:30px;left:-10px;width:22px;height:6px;background:#7a3f2d;border-radius:2px;}
  .swing .kid{position:absolute;top:10px;left:-6px;}
  @keyframes swingMove{
    0%,100%{transform:rotate(-22deg);}
    50%{transform:rotate(22deg);}
  }

  .playarea{position:absolute;bottom:8px;width:120px;height:50px;}
  .ball{
    position:absolute;bottom:0;width:10px;height:10px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ff8a8a, #e63946);
    animation:bounce 1.1s ease-in-out infinite, rollAcross 3.4s ease-in-out infinite;
  }
  @keyframes bounce{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-30px);} }
  @keyframes rollAcross{ 0%,100%{left:0;} 50%{left:90px;} }
  .kid-run{position:absolute;bottom:0;width:16px;height:30px;animation:runAcross 3.4s ease-in-out infinite;}
  @keyframes runAcross{ 0%,100%{left:0;} 50%{left:80px;} }
  .kid-run .leg{transform-origin:8px 20px;animation:runLegs .3s linear infinite;}
  @keyframes runLegs{ 0%,100%{transform:rotate(24deg);} 50%{transform:rotate(-24deg);} }

  /* Ground / road */
  .ground{position:absolute;bottom:0;left:0;width:100%;height:150px;background:var(--road);}
  .sidewalk{position:absolute;top:0;left:0;width:100%;height:20px;background:#c9c9c9;box-shadow:0 1px 0 rgba(0,0,0,.15) inset;}
  .bikelane{position:absolute;top:20px;left:0;width:100%;height:26px;background:#4a5b3f;}
  .bikelane-line{
    position:absolute;top:12px;left:0;width:200%;height:3px;
    background-image:repeating-linear-gradient(to right,#fff 0 18px, transparent 18px 36px);
    opacity:.6;animation:scroll 3s linear infinite;
  }
  .lane-line{
    position:absolute;top:96px;left:0;width:200%;height:4px;
    background-image:repeating-linear-gradient(to right, var(--line) 0 40px, transparent 40px 80px);
    animation:scroll 2.4s linear infinite;
  }

  /* Interactive entities: JS controls transform (translateX + facing) */
  .entity{position:absolute;cursor:pointer;will-change:transform;}
  .entity:hover{filter:drop-shadow(0 0 4px rgba(255,255,255,.9));}
  .entity svg{display:block;pointer-events:none;}

  .ped .leg{transform-origin:7px 20px;animation:walkLegs .55s linear infinite;}
  .ped .leg.b{animation-delay:.275s;}
  @keyframes walkLegs{ 0%,100%{transform:rotate(18deg);} 50%{transform:rotate(-18deg);} }
  .ped .arm{transform-origin:7px 9px;animation:walkArms .55s linear infinite;}
  .ped .arm.b{animation-delay:.275s;}
  @keyframes walkArms{ 0%,100%{transform:rotate(-16deg);} 50%{transform:rotate(16deg);} }

  .wheel-spin{animation:spin .5s linear infinite;transform-origin:center;}
  @keyframes spin{ from{transform:rotate(0);} to{transform:rotate(360deg);} }

  .car-body{position:relative;width:56px;height:20px;border-radius:6px 6px 3px 3px;}
  .car-body::before{content:'';position:absolute;top:-9px;left:11px;width:30px;height:11px;border-radius:6px 6px 0 0;background:inherit;filter:brightness(1.15);}
  .wheel{position:absolute;bottom:-5px;width:9px;height:9px;border-radius:50%;background:#111;border:2px solid #333;}
  .wheel.l{left:6px;} .wheel.r{right:6px;}
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="title">Living City</div>
  <div class="hint">click a car, bike or person to reverse it</div>
  <div class="sun"></div>
  <div id="clouds"></div>
  <div id="birds"></div>

  <div class="layer far" id="far"></div>
  <div class="layer mid" id="mid"></div>
  <div class="layer near" id="near"></div>

  <div class="park" id="park">
    <div class="swingset" style="left:8%;">
      <div class="pole l"></div><div class="pole r"></div><div class="bar"></div>
      <div class="swing">
        <div class="rope l"></div><div class="rope r"></div>
        <div class="kid">
          <svg width="20" height="26" viewBox="0 0 20 26">
            <circle cx="10" cy="6" r="5" fill="#f0b98e"/>
            <rect x="6" y="10" width="8" height="10" rx="3" fill="#ff8e5f"/>
            <rect x="4" y="19" width="4" height="7" rx="2" fill="#4a6fa5"/>
            <rect x="12" y="19" width="4" height="7" rx="2" fill="#4a6fa5"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="playarea" style="left:30%;">
      <div class="ball"></div>
      <div class="kid-run">
        <svg width="16" height="30" viewBox="0 0 16 30">
          <circle cx="8" cy="5" r="4.5" fill="#f0b98e"/>
          <rect x="4" y="9" width="8" height="10" rx="3" fill="#5fb85f"/>
          <rect class="leg" x="3" y="18" width="4" height="9" rx="2" fill="#33475b"/>
          <rect class="leg" x="9" y="18" width="4" height="9" rx="2" fill="#33475b"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="ground">
    <div class="sidewalk"></div>
    <div class="bikelane"><div class="bikelane-line"></div></div>
    <div class="lane-line"></div>
  </div>

  <div id="pedestrians"></div>
  <div id="bikes"></div>
  <div id="cars"></div>
</div>

<script>
/* ---------- Clouds ---------- */
const cloudsEl = document.getElementById('clouds');
for(let i=0;i<5;i++){
  const c = document.createElement('div');
  c.className='cloud';
  const w = 60+Math.random()*60, h = w*0.4;
  c.style.width=w+'px'; c.style.height=h+'px';
  c.style.top = (5+Math.random()*20)+'%';
  c.style.animationDuration = (40+Math.random()*30)+'s';
  c.style.animationDelay = (-Math.random()*40)+'s';
  cloudsEl.appendChild(c);
}

/* ---------- Birds ---------- */
const birdsEl = document.getElementById('birds');
function birdSVG(){
  return `<svg viewBox="0 0 26 14">
    <path class="wing" d="M13 7 C9 1, 3 1, 0 6 C5 6, 9 6, 13 7 Z" fill="#33333a"/>
    <path class="wing" d="M13 7 C17 1, 23 1, 26 6 C21 6, 17 6, 13 7 Z" fill="#33333a"/>
  </svg>`;
}
for(let i=0;i<7;i++){
  const b = document.createElement('div');
  b.className='bird';
  b.style.top = (8+Math.random()*30)+'%';
  b.style.animationDuration = (14+Math.random()*10)+'s';
  b.style.animationDelay = (-Math.random()*20)+'s';
  b.innerHTML = birdSVG();
  birdsEl.appendChild(b);
}

/* ---------- Buildings ---------- */
function buildLayer(id, count, minH, maxH, minW, maxW, winDensity){
  const layer = document.getElementById(id);
  let html = '';
  for(let i=0;i<count;i++){
    const h = Math.floor(Math.random()*(maxH-minH)+minH);
    const w = Math.floor(Math.random()*(maxW-minW)+minW);
    let inner = '';
    const cols = Math.max(2, Math.floor(w/16));
    const rows = Math.max(2, Math.floor(h/16));
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const dim = Math.random() < 0.4;
        inner += `<div class="win ${dim?'dim':''}" style="left:${c*16+6}px; top:${h-(r*16+14)}px;"></div>`;
      }
    }
    html += `<div class="bld" style="width:${w}px;height:${h}px;">${inner}</div>`;
  }
  layer.innerHTML = html + html;
}
buildLayer('far', 20, 70, 150, 40, 70, 0.15);
buildLayer('mid', 16, 110, 220, 50, 90, 0.2);
buildLayer('near', 12, 150, 300, 60, 110, 0.25);

/* ---------- Trees ---------- */
const park = document.getElementById('park');
[3, 20, 55, 72, 90].forEach(p=>{
  const t = document.createElement('div');
  t.className='tree';
  t.style.left = p+'%';
  t.innerHTML = `<div class="leaves"></div><div class="trunk"></div>`;
  park.appendChild(t);
});

/* ================= Interactive movers (click to reverse) ================= */
const movers = []; // {el, x, speed, dir}

function addMover(el, x, y, speed, dir){
  el.classList.add('entity');
  el.style.bottom = y+'px';
  const m = {el, x, speed, dir};
  el.addEventListener('click', (e)=>{
    e.stopPropagation();
    m.dir *= -1;
  });
  render(m);
  movers.push(m);
  return m;
}

function render(m){
  m.el.style.transform = `translateX(${m.x}px) scaleX(${m.dir})`;
}

/* ---------- Pedestrians ---------- */
const pedEl = document.getElementById('pedestrians');
const shirtColors = ['#e07a5f','#3d5a80','#81b29a','#f2cc8f','#9d8189','#588157'];
const pantColors = ['#333','#2b2d42','#4a4a4a','#1d3557'];
const skinTones = ['#f0b98e','#c98a5c','#8d5a3c','#ffdcb0'];
function pedSVG(shirt, pants, skin){
  return `<svg width="14" height="30" viewBox="0 0 14 30">
    <circle cx="7" cy="5" r="4" fill="${skin}"/>
    <rect x="3" y="9" width="8" height="11" rx="3" fill="${shirt}"/>
    <rect class="arm t" x="1.5" y="10" width="3" height="9" rx="1.5" fill="${shirt}"/>
    <rect class="arm b" x="9.5" y="10" width="3" height="9" rx="1.5" fill="${shirt}"/>
    <rect class="leg t" x="3.5" y="19" width="3" height="10" rx="1.5" fill="${pants}"/>
    <rect class="leg b" x="7.5" y="19" width="3" height="10" rx="1.5" fill="${pants}"/>
  </svg>`;
}
for(let i=0;i<9;i++){
  const dir = Math.random()<0.5 ? 1 : -1;
  const p = document.createElement('div');
  p.classList.add('ped');
  p.innerHTML = pedSVG(
    shirtColors[Math.floor(Math.random()*shirtColors.length)],
    pantColors[Math.floor(Math.random()*pantColors.length)],
    skinTones[Math.floor(Math.random()*skinTones.length)]
  );
  const speed = 18 + Math.random()*14;
  const y = Math.random()<0.5 ? 2 : 8;
  const x = Math.random()*window.innerWidth;
  pedEl.appendChild(p);
  addMover(p, x, y, speed, dir);
}

/* ---------- Bikes ---------- */
const bikeEl = document.getElementById('bikes');
function bikeSVG(shirt, skin){
  return `<svg width="40" height="26" viewBox="0 0 40 26">
    <circle class="wheel-spin" cx="8" cy="20" r="6" fill="none" stroke="#222" stroke-width="2"/>
    <circle class="wheel-spin" cx="32" cy="20" r="6" fill="none" stroke="#222" stroke-width="2"/>
    <path d="M8 20 L18 10 L26 10 L32 20" fill="none" stroke="#444" stroke-width="2"/>
    <path d="M18 10 L14 20" stroke="#444" stroke-width="2"/>
    <path d="M22 10 L18 4" stroke="#444" stroke-width="2"/>
    <circle cx="20" cy="1" r="4" fill="${skin}"/>
    <rect x="15" y="4" width="10" height="7" rx="2" fill="${shirt}"/>
  </svg>`;
}
for(let i=0;i<4;i++){
  const dir = Math.random()<0.5 ? 1 : -1;
  const b = document.createElement('div');
  b.innerHTML = bikeSVG(
    shirtColors[Math.floor(Math.random()*shirtColors.length)],
    skinTones[Math.floor(Math.random()*skinTones.length)]
  );
  const speed = 40 + Math.random()*20;
  const x = Math.random()*window.innerWidth;
  bikeEl.appendChild(b);
  addMover(b, x, 22, speed, dir);
}

/* ---------- Cars ---------- */
const carsEl = document.getElementById('cars');
const carColors = ['#e63946','#457b9d','#f4a261','#8ab17d','#6d597a','#eeeeee'];
function carSVG(color){
  return `<div class="car-body" style="background:${color};">
    <div class="wheel l"></div><div class="wheel r"></div>
  </div>`;
}
for(let i=0;i<10;i++){
  const dir = Math.random()<0.5 ? 1 : -1;
  const c = document.createElement('div');
  c.innerHTML = carSVG(carColors[Math.floor(Math.random()*carColors.length)]);
  const speed = 70 + Math.random()*40;
  const lane = Math.random()<0.5 ? 56 : 86;
  const x = Math.random()*window.innerWidth;
  carsEl.appendChild(c);
  addMover(c, x, lane, speed, dir);
}

/* ---------- Animation loop ---------- */
let lastT = performance.now();
function tick(t){
  const dt = Math.min((t - lastT)/1000, 0.05);
  lastT = t;
  const width = window.innerWidth;
  movers.forEach(m=>{
    m.x += m.speed * m.dir * dt;
    if(m.x > width + 80) m.x = -80;
    if(m.x < -80) m.x = width + 80;
    render(m);
  });
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
