<div id="scene" style="display:flex;flex-direction:column;align-items:center;gap:0.5rem;padding:1.5rem 0;border-radius:12px;transition:background 900ms ease;background:#1b2340">
<h2 class="sr-only">A garden of flowers that bloom when you click the moon to turn it into the sun, and close back into buds when you click the sun to turn it into the moon. The background switches between night and day.</h2>
<svg width="280" height="220" viewBox="0 0 280 220" role="img" style="cursor:pointer" id="sky">
<title>Moon and sun toggle</title>
<desc>Click the circle to switch between moon and sun, which controls whether the flowers are blooming or buds, and whether the background is night or day.</desc>
<circle id="body" cx="140" cy="80" r="38" fill="#cfd3da"/>
<g id="craters" fill="#b6bac2">
<circle cx="124" cy="67" r="6"/>
<circle cx="153" cy="62" r="4.5"/>
<circle cx="149" cy="93" r="7"/>
<circle cx="120" cy="93" r="3.5"/>
</g>
<g id="rays" stroke="#f2a93c" stroke-width="5" stroke-linecap="round" opacity="0">
<line x1="140" y1="18" x2="140" y2="4"/>
<line x1="140" y1="142" x2="140" y2="156"/>
<line x1="64" y1="80" x2="50" y2="80"/>
<line x1="216" y1="80" x2="230" y2="80"/>
<line x1="88" y1="28" x2="78" y2="18"/>
<line x1="192" y1="28" x2="202" y2="18"/>
<line x1="88" y1="132" x2="78" y2="142"/>
<line x1="192" y1="132" x2="202" y2="142"/>
</g>
<g id="stars" fill="#ffffff">
<circle cx="30" cy="24" r="1.6"/>
<circle cx="60" cy="50" r="1.2"/>
<circle cx="240" cy="30" r="1.6"/>
<circle cx="215" cy="60" r="1.2"/>
<circle cx="255" cy="110" r="1.4"/>
<circle cx="22" cy="120" r="1.4"/>
<circle cx="45" cy="160" r="1.2"/>
<circle cx="260" cy="160" r="1.6"/>
</g>
</svg>

<svg width="600" height="240" viewBox="0 0 600 240" role="img">
<title>Flower garden</title>
<desc>Three flower stems with buds or blooms depending on whether the sun or moon is showing.</desc>

<line x1="130" y1="240" x2="130" y2="150" stroke="#3f8d4a" stroke-width="6" stroke-linecap="round"/>
<path d="M130 195 Q 105 200 92 182" fill="none" stroke="#3f8d4a" stroke-width="5" stroke-linecap="round"/>
<g id="petals1" class="petals" transform="translate(130,130) scale(0.15)">
<g fill="#e8698b">
<ellipse cx="0" cy="-55" rx="26" ry="50"/>
<ellipse cx="0" cy="-55" rx="26" ry="50" transform="rotate(51)"/>
<ellipse cx="0" cy="-55" rx="26" ry="50" transform="rotate(102)"/>
<ellipse cx="0" cy="-55" rx="26" ry="50" transform="rotate(153)"/>
<ellipse cx="0" cy="-55" rx="26" ry="50" transform="rotate(204)"/>
<ellipse cx="0" cy="-55" rx="26" ry="50" transform="rotate(255)"/>
<ellipse cx="0" cy="-55" rx="26" ry="50" transform="rotate(306)"/>
</g>
<circle cx="0" cy="0" r="24" fill="#f5b942"/>
</g>

<line x1="300" y1="240" x2="300" y2="130" stroke="#3f8d4a" stroke-width="6" stroke-linecap="round"/>
<path d="M300 175 Q 270 180 255 160" fill="none" stroke="#3f8d4a" stroke-width="5" stroke-linecap="round"/>
<path d="M300 195 Q 330 200 345 180" fill="none" stroke="#3f8d4a" stroke-width="5" stroke-linecap="round"/>
<g id="petals2" class="petals" transform="translate(300,110) scale(0.15)">
<g fill="#8a6fd8">
<ellipse cx="0" cy="-52" rx="24" ry="46"/>
<ellipse cx="0" cy="-52" rx="24" ry="46" transform="rotate(60)"/>
<ellipse cx="0" cy="-52" rx="24" ry="46" transform="rotate(120)"/>
<ellipse cx="0" cy="-52" rx="24" ry="46" transform="rotate(180)"/>
<ellipse cx="0" cy="-52" rx="24" ry="46" transform="rotate(240)"/>
<ellipse cx="0" cy="-52" rx="24" ry="46" transform="rotate(300)"/>
</g>
<circle cx="0" cy="0" r="22" fill="#f5b942"/>
</g>

<line x1="470" y1="240" x2="470" y2="160" stroke="#3f8d4a" stroke-width="6" stroke-linecap="round"/>
<path d="M470 205 Q 445 210 432 192" fill="none" stroke="#3f8d4a" stroke-width="5" stroke-linecap="round"/>
<g id="petals3" class="petals" transform="translate(470,140) scale(0.15)">
<g fill="#f2934a">
<ellipse cx="0" cy="-50" rx="24" ry="44"/>
<ellipse cx="0" cy="-50" rx="24" ry="44" transform="rotate(45)"/>
<ellipse cx="0" cy="-50" rx="24" ry="44" transform="rotate(90)"/>
<ellipse cx="0" cy="-50" rx="24" ry="44" transform="rotate(135)"/>
<ellipse cx="0" cy="-50" rx="24" ry="44" transform="rotate(180)"/>
<ellipse cx="0" cy="-50" rx="24" ry="44" transform="rotate(225)"/>
<ellipse cx="0" cy="-50" rx="24" ry="44" transform="rotate(270)"/>
<ellipse cx="0" cy="-50" rx="24" ry="44" transform="rotate(315)"/>
</g>
<circle cx="0" cy="0" r="21" fill="#fbe08a"/>
</g>
</svg>
<p style="font-size:13px;color:#dfe3ee;margin:0" id="hint">Click the moon to make it the sun and watch the flowers bloom.</p>
</div>
<script>
let isSun = false;
const scene = document.getElementById('scene');
const body = document.getElementById('body');
const craters = document.getElementById('craters');
const rays = document.getElementById('rays');
const stars = document.getElementById('stars');
const hint = document.getElementById('hint');
const sky = document.getElementById('sky');
const petals = document.querySelectorAll('.petals');
const bases = [
  {x:130,yOpen:130,yClosed:130},
  {x:300,yOpen:110,yClosed:110},
  {x:470,yOpen:140,yClosed:140}
];

petals.forEach(p => p.style.transition = 'transform 900ms cubic-bezier(.34,1.56,.64,1)');
body.style.transition = 'fill 500ms ease';
rays.style.transition = 'opacity 500ms ease';
craters.style.transition = 'opacity 300ms ease';
stars.style.transition = 'opacity 500ms ease';

sky.addEventListener('click', () => {
  isSun = !isSun;
  if (isSun) {
    scene.style.background = '#bfe4f5';
    body.setAttribute('fill', '#f2a93c');
    craters.style.opacity = '0';
    rays.style.opacity = '1';
    stars.style.opacity = '0';
    hint.style.color = '#2b3a4a';
    hint.textContent = 'Click the sun to turn it back into the moon and watch the flowers close.';
  } else {
    scene.style.background = '#1b2340';
    body.setAttribute('fill', '#cfd3da');
    craters.style.opacity = '1';
    rays.style.opacity = '0';
    stars.style.opacity = '1';
    hint.style.color = '#dfe3ee';
    hint.textContent = 'Click the moon to make it the sun and watch the flowers bloom.';
  }
  bases.forEach((b, i) => {
    const scale = isSun ? 1 : 0.15;
    petals[i].style.transform = `translate(${b.x}px,${b.yOpen}px) scale(${scale})`;
  });
});
</script>
